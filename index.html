<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fem Homes Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background-color: #1a1a1a; }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100%;
    padding: 2rem;
    background-color: #EBEBEB;
  }
  .login-title {
    font-family: 'Special Elite', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: #1a1a1a;
    letter-spacing: 0.04em;
    text-align: center;
    margin-bottom: 0.4rem;
  }
  .login-subtitle {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    text-align: center;
  }
  .login-box {
    background: #fff;
    border-radius: 12px;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 340px;
    border: 0.5px solid #ddd;
  }
  .login-box label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .login-box input[type="password"] {
    width: 100%;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.25rem;
    letter-spacing: 0.2em;
  }
  .login-box input[type="password"]:focus { border-color: #E8724A; background: #fff; }
  .btn-acceso {
    width: 100%;
    background: #E8724A;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.8rem 1rem;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-acceso:hover { background: #d4613b; }
  .btn-acceso:active { transform: scale(0.98); }
  .error-msg {
    font-size: 12px;
    color: #c0392b;
    text-align: center;
    margin-top: 0.75rem;
    min-height: 18px;
  }

  /* ── LAB ── */
  #lab-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .lab-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-color: #1a1a1a;
    z-index: 0;
  }
  .lab-bg-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1;
  }

  /* Header */
  .lab-header {
    position: relative;
    z-index: 10;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .lab-header-title {
    font-family: 'Special Elite', serif;
    font-size: 1.1rem;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .lab-header-sub {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-cambiar-fondo {
    font-size: 12px;
    color: #E8724A;
    background: none;
    border: 0.5px solid #E8724A;
    border-radius: 6px;
    padding: 0.35rem 0.8rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-cambiar-fondo:hover { background: #E8724A; color: #fff; }
  .btn-salir {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    background: none;
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 0.35rem 0.8rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-salir:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
  #bg-input { display: none; }

  /* Grid */
  .lab-content {
    position: relative;
    z-index: 10;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 12px;
    padding: 12px;
    min-height: 0;
  }

  /* Tarjeta activa */
  .tool-card {
    background: rgba(10,10,10,0.45);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 0.5px solid rgba(212,175,55,0.25);
    border-radius: 16px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    transition: transform 0.2s, background 0.2s, border-color 0.2s;
    box-shadow: 0 0 0 1px rgba(212,175,55,0.08), inset 0 0 40px rgba(0,0,0,0.2);
    min-height: 0;
    gap: 0.6rem;
  }
  .tool-card:hover {
    transform: scale(1.012);
    background: rgba(10,10,10,0.6);
    border-color: rgba(212,175,55,0.55);
    box-shadow: 0 0 0 1px rgba(212,175,55,0.2), 0 8px 40px rgba(212,175,55,0.08);
  }

  /* Tarjeta inactiva */
  .tool-card-inactive {
    background: rgba(10,10,10,0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 0.5px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    gap: 0.6rem;
    opacity: 0.5;
    min-height: 0;
  }

  /* Número romano */
  .roman {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 400;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(212,175,55,0.7);
    text-shadow:
      0 0 20px rgba(212,175,55,0.15),
      0 2px 8px rgba(0,0,0,0.5);
    letter-spacing: 0.06em;
  }

  .roman-inactive {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 400;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.15);
    letter-spacing: 0.06em;
  }

  /* Nombre arcano */
  .arcano-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.4vw, 0.85rem);
    font-weight: 400;
    color: rgba(212,175,55,0.8);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  .arcano-name-inactive {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.4vw, 0.85rem);
    font-weight: 400;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
  }

  /* Nombre herramienta */
  .tool-name {
    font-size: clamp(0.7rem, 1.3vw, 0.9rem);
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.1em;
    text-align: center;
    text-transform: uppercase;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  .divider {
    width: 30px;
    height: 0.5px;
    background: rgba(212,175,55,0.35);
  }

  /* Footer */
  .lab-footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0.5rem;
    flex-shrink: 0;
  }
  .lab-footer a {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .lab-footer a:hover { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1 class="login-title">Fem Homes Lab</h1>
  <p class="login-subtitle">femhomes.com</p>
  <div class="login-box">
    <label for="pwd">Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••" autofocus />
    <button class="btn-acceso" onclick="checkPassword()">Acceder</button>
    <p class="error-msg" id="error-msg"></p>
  </div>
</div>

<!-- LAB -->
<div id="lab-screen">
  <div class="lab-bg" id="lab-bg"></div>
  <div class="lab-bg-overlay"></div>

  <div class="lab-header">
    <div>
      <div class="lab-header-title">Fem Homes Lab</div>
      <div class="lab-header-sub">Herramientas</div>
    </div>
    <div class="header-right">
      <button class="btn-cambiar-fondo" onclick="document.getElementById('bg-input').click()">Cambiar fondo</button>
      <button class="btn-salir" onclick="logout()">Salir</button>
    </div>
  </div>

  <input type="file" id="bg-input" accept="image/*" onchange="cambiarFondo(event)" />

  <div class="lab-content">

    <a class="tool-card" href="./arcano/">
      <div class="roman">V</div>
      <div class="arcano-name">El Sumo Sacerdote</div>
      <div class="divider"></div>
      <div class="tool-name">El Espejo del Arcano</div>
    </a>

    <a class="tool-card" href="./finanzas/">
      <div class="roman">XXI</div>
      <div class="arcano-name">El Mundo</div>
      <div class="divider"></div>
      <div class="tool-name">Finanzas</div>
    </a>

    <a class="tool-card" href="./Chroma/">
      <div class="roman">III</div>
      <div class="arcano-name">La Emperatriz</div>
      <div class="divider"></div>
      <div class="tool-name">Chroma</div>
    </a>

    <a class="tool-card" href="./presupuestos/">
      <div class="roman">VII</div>
      <div class="arcano-name">El Carro</div>
      <div class="divider"></div>
      <div class="tool-name">Presupuestos</div>
    </a>

    <a class="tool-card" href="./edificio/">
      <div class="roman">XVI</div>
      <div class="arcano-name">La Torre</div>
      <div class="divider"></div>
      <div class="tool-name">Edificio PSJ 97</div>
    </a>

  </div>

  <div class="lab-footer">
    <a href="https://www.femhomes.com">femhomes.com →</a>
  </div>
</div>

<script>
  const PASSWORD = '1812';
  const SESSION_KEY = 'fhl_auth';
  const BG_KEY = 'fhl_bg';

  function checkPassword() {
    const input = document.getElementById('pwd').value;
    if (input === PASSWORD) {
      localStorage.setItem(SESSION_KEY, 'true');
      showLab();
    } else {
      document.getElementById('error-msg').textContent = 'Contraseña incorrecta';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }

  function showLab() {
    document.getElementById('login-screen').style.display = 'none';
    const lab = document.getElementById('lab-screen');
    lab.style.display = 'flex';
    const savedBg = localStorage.getItem(BG_KEY);
    if (savedBg) {
      document.getElementById('lab-bg').style.backgroundImage = 'url(' + savedBg + ')';
    }
  }

  function logout() {
    localStorage.removeItem(SESSION_KEY);
    document.getElementById('lab-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pwd').value = '';
    document.getElementById('error-msg').textContent = '';
  }

  function cambiarFondo(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const dataUrl = e.target.result;
      document.getElementById('lab-bg').style.backgroundImage = 'url(' + dataUrl + ')';
      try { localStorage.setItem(BG_KEY, dataUrl); } catch(e) {}
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('pwd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  if (localStorage.getItem(SESSION_KEY) === 'true') {
    showLab();
  }
</script>
</body>
</html>

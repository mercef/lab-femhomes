<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fem Homes — Presupuestos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F2;--white:#FFF;--surface:#FAFAF8;
  --border:#E8E4DE;--border-strong:#D4CEC6;
  --text:#1C1917;--text-2:#6B6560;--text-3:#A8A29E;
  --accent:#E8724A;--accent-light:#FEF0EB;--accent-dim:rgba(232,114,74,0.08);
  --danger:#DC2626;--danger-bg:#FEF2F2;
  --success:#16A34A;--success-bg:#F0FDF4;
  --r:12px;--rsm:7px;--rlg:16px;
  --sh:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shmd:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;min-height:100vh}
.shell{max-width:1040px;margin:0 auto;padding:22px 18px 60px}

/* HEADER */
.app-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.app-title{font-family:'Fraunces',serif;font-size:21px;font-weight:300;letter-spacing:-.02em}
.app-title span{color:var(--accent)}

/* CFG */
.cfg-panel{background:var(--white);border:0.5px solid var(--border);border-radius:var(--rlg);box-shadow:var(--shmd);padding:22px;margin-bottom:20px;display:none}
.cfg-panel.open{display:block}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.cfg-sep{font-family:'Fraunces',serif;font-size:13px;color:var(--text-2);padding-bottom:9px;border-bottom:0.5px solid var(--border);margin-top:18px}
.cfg-sep:first-child{margin-top:0}
.fl{font-size:11px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.fi{width:100%;padding:7px 10px;font-size:13px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent);background:var(--white)}
.cfg-note{font-size:11px;color:var(--text-3);margin-top:4px}

/* MAIN TABS */
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:22px;overflow-x:auto}
.tab{padding:9px 15px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-2);margin-bottom:-0.5px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.tab:hover:not(.active){color:var(--text)}
.tnum{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:10px;font-weight:500;margin-right:5px}
.tab.active .tnum{background:var(--accent);color:#fff}
.view{display:none}.view.active{display:block}

/* SUB TABS (inside project) */
.subtabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:18px}
.subtab{padding:7px 14px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-2);margin-bottom:-0.5px;transition:all .15s}
.subtab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.subtab:hover:not(.active){color:var(--text)}
.subview{display:none}.subview.active{display:block}

/* BUTTONS */
.btn{padding:6px 13px;font-size:12px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--white);color:var(--text);cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.btn:hover{background:var(--surface);border-color:var(--border-strong)}
.btn.pr{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.pr:hover{background:#d4613b}
.btn.sm{padding:4px 9px;font-size:11px;box-shadow:none}
.btn.gh{background:transparent;border-color:transparent;box-shadow:none;color:var(--text-2)}
.btn.gh:hover{background:var(--surface);color:var(--text)}
.btn.ok{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.bdash{display:flex;align-items:center;gap:8px;width:100%;padding:11px 16px;border:1px dashed var(--border-strong);border-radius:var(--rlg);background:transparent;color:var(--text-2);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.bdash:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.bdel{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:14px;padding:2px 5px;border-radius:4px;line-height:1}
.bdel:hover{color:var(--danger);background:var(--danger-bg)}

/* CARD */
.card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--rlg);box-shadow:var(--sh);overflow:hidden}
.card-hd{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.card-bd{padding:14px 16px}

/* INLINE EDIT */
.ie{padding:2px 5px;font-size:13px;font-family:'DM Sans',sans-serif;border:0.5px solid transparent;border-radius:3px;background:transparent;color:var(--text);outline:none;width:100%}
.ie:hover{border-color:var(--border)}
.ie:focus{border-color:var(--accent);background:var(--white)}
.ie.sm{font-size:12px}
.ie.r{text-align:right}

/* DROP ZONE */
.dz{border:1.5px dashed var(--border-strong);border-radius:var(--rsm);padding:16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)}
.dz:hover,.dz.drag{border-color:var(--accent);background:var(--accent-light)}
.dz input{display:none}
.dz p{font-size:12px;color:var(--text-2)}
.dz p strong{color:var(--accent)}

/* PRO / PROJECT */
.pro-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:13px;color:var(--accent);flex-shrink:0}
.ch-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);padding:4px 0 5px;border-bottom:0.5px solid var(--accent-dim);margin-bottom:5px;display:flex;justify-content:space-between}

/* PTABLE */
.ptable{width:100%;border-collapse:collapse;font-size:12px}
.ptable th{text-align:left;font-size:9px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;padding:4px 6px;border-bottom:0.5px solid var(--border)}
.ptable th.r{text-align:right}
.ptable td{padding:5px 6px;border-bottom:0.5px solid var(--border);vertical-align:top}
.ptable tr:last-child td{border-bottom:none}
.ptable td.r{text-align:right;color:var(--text-2)}
.ptable td.price{text-align:right;font-weight:500;white-space:nowrap}

/* CON TABLE */
.contable{width:100%;border-collapse:collapse;font-size:12px}
.contable th{text-align:left;font-size:9px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;padding:6px 9px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.contable th.r{text-align:right}
.contable td{padding:6px 9px;border-bottom:0.5px solid var(--border);vertical-align:top}
.contable tr:last-child td{border-bottom:none}
.contable tr:hover td{background:rgba(232,114,74,0.02)}
.contable td.r{text-align:right}
.ne{width:100%;padding:2px 4px;font-size:12px;font-family:'DM Sans',sans-serif;border:0.5px solid transparent;border-radius:3px;background:transparent;color:var(--text);outline:none;resize:none;line-height:1.4;font-weight:500}
.ne:hover{border-color:var(--border)}
.ne:focus{border-color:var(--accent);background:var(--white)}
.de{width:100%;padding:2px 4px;font-size:11px;font-family:'DM Sans',sans-serif;border:0.5px solid transparent;border-radius:3px;background:transparent;color:var(--text-2);outline:none;resize:none;line-height:1.4;margin-top:2px}
.de:hover{border-color:var(--border)}
.de:focus{border-color:var(--accent);background:var(--white)}
.pctinp{width:46px;padding:3px 4px;font-size:12px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border);border-radius:3px;background:var(--surface);text-align:right;outline:none}
.pctinp:focus{border-color:var(--accent)}
.pctinp:disabled{opacity:.3}
.ckinp{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}

/* TOTALS */
.tbar{background:var(--white);border:0.5px solid var(--border);border-radius:var(--rlg);box-shadow:var(--sh);padding:13px 16px;display:flex;gap:22px;flex-wrap:wrap;margin-top:10px;align-items:center}
.ti .lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:2px}
.ti .val{font-size:16px;font-family:'Fraunces',serif;font-weight:300}
.ti .val.or{color:var(--accent)}
.ti .val.mu{color:var(--text-2);font-size:14px}
.tdiv{width:0.5px;background:var(--border);align-self:stretch;min-height:26px}

/* DB */
.db-layout{display:grid;grid-template-columns:210px 1fr;gap:14px;min-height:480px}
.db-sidebar{background:var(--white);border:0.5px solid var(--border);border-radius:var(--rlg);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
.db-main{background:var(--white);border:0.5px solid var(--border);border-radius:var(--rlg);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
.db-cat{padding:7px 13px;cursor:pointer;font-size:13px;color:var(--text-2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.db-cat:hover{background:var(--surface)}
.db-cat.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.db-cnt{font-size:10px;color:var(--text-3);background:var(--surface);padding:1px 6px;border-radius:10px}
.db-cat.active .db-cnt{background:var(--accent-light);color:var(--accent)}
.dbtable{width:100%;border-collapse:collapse;font-size:12px}
.dbtable th{text-align:left;font-size:9px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;padding:6px 9px;border-bottom:0.5px solid var(--border);background:var(--surface);position:sticky;top:0}
.dbtable th.r{text-align:right}
.dbtable td{padding:6px 9px;border-bottom:0.5px solid var(--border);vertical-align:top}
.dbtable tr:last-child td{border-bottom:none}
.dbtable tr:hover td{background:rgba(232,114,74,0.02)}
.dbtable td.r{text-align:right;color:var(--text-2)}

/* SPINNER */
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.xtring{display:flex;align-items:center;gap:8px;padding:12px;font-size:12px;color:var(--text-2)}

/* PROJ LIST */
.proj-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--rlg);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.proj-card:hover{box-shadow:var(--shmd)}
.proj-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim),var(--shmd)}
.proj-meta{font-size:11px;color:var(--text-3)}

/* MISC */
.empty{padding:28px;text-align:center;color:var(--text-3);font-size:13px}
.empty-icon{font-size:26px;margin-bottom:6px;display:block;opacity:.4}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--accent-dim);color:var(--accent);font-weight:500}
.ch-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--accent-dim);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--accent)}
</style>
</head>
<body>
<div class="shell">

<div class="app-hdr">
  <div class="app-title">Fem Homes <span>Presupuestos</span></div>
  <button class="btn" onclick="toggleCfg()">&#9881; Configuraci&oacute;n</button>
</div>

<!-- CFG PANEL -->
<div class="cfg-panel" id="cfgp">
  <div class="cfg-sep" style="margin-top:0;border-top:none">Empresa</div>
  <div class="cfg-grid">
    <div style="grid-column:1/-1"><label class="fl">Logo</label><input type="file" id="cfg-logo-input" accept="image/*" onchange="uploadLogo(this)" style="display:none"><button class="btn sm" onclick="document.getElementById('cfg-logo-input').click()">Subir logo</button><img id="cfg-logo-preview" style="height:38px;margin-left:10px;border-radius:5px;display:none;border:0.5px solid var(--border)"></div>
    <div><label class="fl">Empresa</label><input class="fi" id="cfg-empresa" placeholder="Mi Empresa S.L." oninput="saveCfg()"></div>
    <div><label class="fl">Web</label><input class="fi" id="cfg-web" placeholder="www.miempresa.com" oninput="saveCfg()"></div>
    <div><label class="fl">Email</label><input class="fi" id="cfg-email" placeholder="info@miempresa.com" oninput="saveCfg()"></div>
    <div><label class="fl">Tel&eacute;fono</label><input class="fi" id="cfg-tel" oninput="saveCfg()"></div>
    <div style="grid-column:1/-1"><label class="fl">N&uacute;mero de cuenta</label><input class="fi" id="cfg-cuenta" placeholder="ES00 0000..." oninput="saveCfg()"></div>
    <div style="grid-column:1/-1"><label class="fl">Condiciones generales</label><textarea class="fi" id="cfg-condiciones" rows="4" style="resize:vertical;line-height:1.5" oninput="saveCfg()"></textarea></div>
  </div>
  <div class="cfg-sep">API Anthropic</div>
  <div style="margin-top:12px"><label class="fl">API Key</label><input class="fi" id="cfg-key" type="password" placeholder="sk-ant-..." oninput="saveCfg()"><div class="cfg-note">Solo se guarda en tu navegador.</div></div>
  <div style="display:flex;justify-content:flex-end;margin-top:16px"><button class="btn pr" onclick="toggleCfg()">Cerrar</button></div>
</div>

<!-- MAIN TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)"><span class="tnum">1</span>Proyectos</div>
  <div class="tab" onclick="switchTab(1)"><span class="tnum">2</span>Mi presupuesto</div>
  <div class="tab" onclick="switchTab(2)"><span class="tnum">3</span>Vista cliente</div>
  <div class="tab" onclick="switchTab(3)"><span class="tnum">4</span>Base de datos</div>
</div>

<!-- TAB 1: PROYECTOS -->
<div class="view active" id="v0">
  <div style="display:grid;grid-template-columns:260px 1fr;gap:16px">
    <div>
      <div id="proj-list"></div>
      <button class="bdash" onclick="addProject()">+ Nuevo proyecto</button>
    </div>
    <div id="proj-detail">
      <div class="empty"><span class="empty-icon">&#128195;</span>Selecciona o crea un proyecto.</div>
    </div>
  </div>
</div>

<!-- TAB 2: MI PRESUPUESTO -->
<div class="view" id="v1">
  <div class="card" style="padding:16px;margin-bottom:14px">
    <div style="font-family:'Fraunces',serif;font-size:14px;color:var(--text-2);margin-bottom:11px">Datos del presupuesto</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div><label class="fl">Cliente</label><input class="fi" type="text" id="f-cliente"></div>
      <div><label class="fl">N&ordm; presupuesto</label><input class="fi" type="text" id="f-num" placeholder="E261470"></div>
      <div><label class="fl">Fecha</label><input class="fi" type="date" id="f-fecha"></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn pr" id="btn-mejorar" onclick="mejorarTextos()">&#10022; Mejorar textos con IA</button>
    <button class="btn" onclick="addManualLine()">+ A&ntilde;adir l&iacute;nea</button>
    <span style="font-size:12px;color:var(--text-2);font-style:italic" id="ia-status"></span>
  </div>
  <div id="con-content"></div>
  <div id="totals-bar"></div>
  <div id="comment-box" style="display:none;background:var(--white);border:0.5px solid var(--border);border-radius:var(--rlg);box-shadow:var(--sh);padding:13px 16px;margin-top:10px">
    <label class="fl">Comentario final (visible en el PDF)</label>
    <textarea class="fi" id="f-comentario" rows="3" style="resize:vertical;line-height:1.5;margin-top:6px"></textarea>
  </div>
</div>

<!-- TAB 3: VISTA CLIENTE -->
<div class="view" id="v2">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:0.5px solid var(--border);background:var(--surface)">
      <span style="font-family:'Fraunces',serif;font-size:14px;font-weight:400;color:var(--text-2)">Vista previa</span>
      <div style="display:flex;gap:8px">
        <button class="btn sm" onclick="saveToProject()">&#128190; Guardar en proyecto</button>
        <button class="btn sm pr" onclick="printPDF()">Exportar PDF</button>
      </div>
    </div>
    <div id="pdf-doc" style="padding:34px;background:white"></div>
  </div>
</div>

<!-- TAB 4: BASE DE DATOS -->
<div class="view" id="v3">
  <div class="db-layout">
    <div class="db-sidebar">
      <div style="padding:11px 13px;border-bottom:0.5px solid var(--border);background:var(--surface)">
        <div style="font-family:'Fraunces',serif;font-size:14px;color:var(--text-2)">Cat&aacute;logo</div>
      </div>
      <div style="flex:1;overflow-y:auto" id="db-cats"></div>
      <div style="padding:9px"><button class="bdash" style="padding:7px 12px;font-size:12px" onclick="addDbCat()">+ Categor&iacute;a</button></div>
    </div>
    <div class="db-main">
      <div style="padding:10px 14px;border-bottom:0.5px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <button class="btn sm pr" onclick="addDbPartida()">+ Partida</button>
        <button class="btn sm" onclick="document.getElementById('db-pdf-inp').click()">&#128196; PDF/Cat&aacute;logo</button>
        <input type="file" id="db-pdf-inp" accept="application/pdf" style="display:none" onchange="importDbPDF(this)">
        <button class="btn sm" onclick="document.getElementById('db-csv-inp').click()">&#128203; CSV proveedor</button>
        <input type="file" id="db-csv-inp" accept=".csv,.txt" style="display:none" onchange="importDbCSV(this)">
        <span style="flex:1"></span>
        <button class="btn sm pr" id="db-add-btn" style="display:none" onclick="addSelToBudget()">A&ntilde;adir selecci&oacute;n al presupuesto</button>
      </div>
      <div style="padding:8px 14px;border-bottom:0.5px solid var(--border);display:flex;gap:8px;align-items:center">
        <input class="fi" id="db-search" placeholder="Buscar..." oninput="renderDb()" style="flex:1;padding:5px 9px">
        <button class="btn sm gh" onclick="toggleAllDb()">Sel. todo</button>
      </div>
      <div style="flex:1;overflow-y:auto" id="db-table"></div>
      <div style="padding:8px 14px;border-top:0.5px solid var(--border);background:var(--surface)">
        <span style="font-size:12px;color:var(--text-2)" id="db-sel-cnt">0 seleccionadas</span>
      </div>
    </div>
  </div>
</div>

</div><!-- /shell -->

<script>
// ── STATE ────────────────────────────────────────────────────────────
var projects=[],activeProjectId=null;
var lines={},improved={},manualLines=[],cfg={};
var db={cats:[],partidas:[]},dbSel={},dbActiveCat=null;
var DEFAULT_PCT=10,OG='#E8724A';

function uid(){return Math.random().toString(36).slice(2,9)}
function fmt(n){return Number(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+'\u00a0\u20ac'}
function fmtP(n){return Number(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' \u20ac'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
function initials(n){return(n||'?').trim().charAt(0).toUpperCase()}

// ── PERSIST ──────────────────────────────────────────────────────────
function save(){
  try{
    localStorage.setItem('fhl_projects',JSON.stringify(projects));
    localStorage.setItem('fhl_lines5',JSON.stringify(lines));
    localStorage.setItem('fhl_imp5',JSON.stringify(improved));
    localStorage.setItem('fhl_manual5',JSON.stringify(manualLines));
    localStorage.setItem('fhl_db5',JSON.stringify(db));
  }catch(e){}
}
function load(){
  try{
    var p=localStorage.getItem('fhl_projects');if(p)projects=JSON.parse(p);
    var l=localStorage.getItem('fhl_lines5');if(l)lines=JSON.parse(l);
    var im=localStorage.getItem('fhl_imp5');if(im)improved=JSON.parse(im);
    var ml=localStorage.getItem('fhl_manual5');if(ml)manualLines=JSON.parse(ml);
    var d=localStorage.getItem('fhl_db5');if(d)db=JSON.parse(d);
  }catch(e){}
}

// ── CFG ──────────────────────────────────────────────────────────────
function loadCfg(){
  try{cfg=JSON.parse(localStorage.getItem('fhl_cfg4')||'{}')}catch(e){cfg={}}
  ['empresa','web','email','tel','cuenta','condiciones','key'].forEach(function(k){var el=document.getElementById('cfg-'+k);if(el&&cfg[k])el.value=cfg[k]});
  if(cfg.logo){var i=document.getElementById('cfg-logo-preview');i.src=cfg.logo;i.style.display='inline-block'}
}
function saveCfg(){
  ['empresa','web','email','tel','cuenta','condiciones','key'].forEach(function(k){var el=document.getElementById('cfg-'+k);if(el)cfg[k]=el.value});
  localStorage.setItem('fhl_cfg4',JSON.stringify(cfg));
}

function addPro(projId){

}
function removePro(projId,proId){

  proj.pros=proj.pros.filter(function(pr){return pr.id!==proId});
  save();renderProjectDetail();
}
function upPro(projId,proId,f,v){
  var proj=projects.find(function(p){return p.id===projId});if(!proj)return;
  var pro=proj.pros&&proj.pros.find(function(pr){return pr.id===proId});if(pro)pro[f]=v;save();
}
function upPartida(projId,proId,chId,rid,f,v){
  var proj=projects.find(function(p){return p.id===projId});if(!proj)return;
  var pro=proj.pros&&proj.pros.find(function(pr){return pr.id===proId});if(!pro)return;
  var ch=pro.chapters&&pro.chapters.find(function(c){return c.id===chId});if(!ch)return;
  var r=ch.partidas.find(function(x){return x.id===rid});if(!r)return;
  r[f]=(f==='qty'||f==='price')?(parseFloat(v)||0):v;save();
}
function removePartida(projId,proId,chId,rid){
  var proj=projects.find(function(p){return p.id===projId});if(!proj)return;
  var pro=proj.pros&&proj.pros.find(function(pr){return pr.id===proId});if(!pro)return;
  var ch=pro.chapters&&pro.chapters.find(function(c){return c.id===chId});if(!ch)return;
  ch.partidas=ch.partidas.filter(function(r){return r.id!==rid});save();renderProjectDetail();
}
function dropPDF(e,projId,proId){e.preventDefault();var f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')extractPDF(projId,proId,f)}
function selectPDF(inp,projId,proId){var f=inp.files[0];if(f)extractPDF(projId,proId,f)}

async function extractPDF(projId,proId,file){
  var key=cfg.key||'';
  if(!key){alert('Introduce tu API key en Configuraci\u00f3n.');toggleCfg();return;}
  var stEl=document.getElementById('es-'+proId);
  if(stEl)stEl.innerHTML='<div class="xtring"><div class="spin"></div>Extrayendo cap\u00edtulos, partidas y descripciones...</div>';
  var b64=await toB64(file);
  var prompt='Analiza este presupuesto PDF de construcci\u00f3n/reforma en Espa\u00f1a.\nExtrae estructura en 3 niveles:\n1. CAP\u00cdTULOS (Alba\u00f1iler\u00eda, Electricidad, Fontaner\u00eda...)\n2. PARTIDAS: cada l\u00ednea con precio (nombre, ud, qty, precio unitario)\n3. DESCRIPCI\u00d3N: texto sin precio debajo de una partida (m\u00e1x 150 chars)\nExtrae TODAS las partidas. Sin precio usa 0. Sin ud/qty usa PA/1.\nDevuelve SOLO JSON:\n{"chapters":[{"name":"Cap","partidas":[{"name":"T\u00edtulo","ud":"PA","qty":1,"price":0,"description":"texto"}]}]}';
  try{
    var res=await apiCall([{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}]}],8000);
    var json=safeParseJSON(res);
    var proj=projects.find(function(p){return p.id===projId});
    var pro=proj&&proj.pros&&proj.pros.find(function(pr){return pr.id===proId});
    if(pro){
      pro.chapters=(json.chapters||[]).map(function(ch){return{id:uid(),name:ch.name||'General',partidas:(ch.partidas||[]).map(function(pt){return{id:uid(),name:pt.name||'',ud:pt.ud||'PA',qty:parseFloat(pt.qty)||1,price:parseFloat(pt.price)||0,description:pt.description||''}})}});
      save();renderProjectDetail();
    }
  }catch(e){if(stEl)stEl.innerHTML='<div style="padding:10px;color:var(--danger);font-size:12px">Error: '+esc(e.message)+'</div>'}
}

      +'<td><div style="font-weight:500">'+esc(p.name)+'</div>'+(p.description?'<div style="font-size:10px;color:var(--text-3)">'+esc(p.description)+'</div>':'')+'</td>'
      +'<td style="color:var(--text-3)">'+(cat?esc(cat.name):'')+'</td>'
      +'<td style="color:var(--text-3)">'+esc(p.ud||'')+'</td>'
      +'<td class="r">'+fmt(p.price||0)+'</td></tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}
function toggleAllDbMini(cb){document.querySelectorAll('.dbm-chk').forEach(function(c){c.checked=cb.checked})}
function addDbSelToProject(projId){
  var sel=[];
  document.querySelectorAll('.dbm-chk:checked').forEach(function(c){sel.push(c.dataset.id)});
  if(!sel.length){alert('Selecciona partidas primero.');return;}
  var proj=projects.find(function(p){return p.id===projId});if(!proj)return;
  if(!proj.pros)proj.pros=[];
  var dbPro=proj.pros.find(function(pr){return pr.id==='__db__'});
  if(!dbPro){dbPro={id:'__db__',name:'Cat\u00e1logo propio',chapters:[]};proj.pros.push(dbPro)}
  sel.forEach(function(id){
    var p=db.partidas.find(function(x){return x.id===id});if(!p)return;
    var cat=(db.cats||[]).find(function(c){return c.id===p.catId});
    var catName=cat?cat.name:'General';
    var ch=dbPro.chapters.find(function(c){return c.name===catName});
    if(!ch){ch={id:uid(),name:catName,partidas:[]};dbPro.chapters.push(ch)}
    if(!ch.partidas.find(function(r){return r.srcId===id})){
      ch.partidas.push({id:uid(),srcId:id,name:p.name,description:p.description||'',ud:p.ud||'ud',qty:1,price:p.price||0});
    }
  });
  save();renderProjectDetail();
  alert(sel.length+' partidas a\u00f1adidas al proyecto.');
}

// ── CONSTRUCTOR (tab 2) ───────────────────────────────────────────────
function lineKey(projId,proId,chId,rid){return projId+'__'+proId+'__'+chId+'__'+rid}
function getLine(k){if(!lines[k])lines[k]={included:true,pct:DEFAULT_PCT,myName:null,myDesc:null,inclDesc:true,qty:null,price:null};return lines[k]}
function toggleIncluded(k){var l=getLine(k);l.included=!l.included;save();renderConstructor()}
function updatePct(k,v){getLine(k).pct=parseFloat(v)||0;save();renderConstructor()}
function updateNameInLine(k,v){getLine(k).myName=v;save()}
function updateDescInLine(k,v){getLine(k).myDesc=v;save()}
function toggleInclDesc(k){var l=getLine(k);l.inclDesc=!l.inclDesc;save();renderConstructor()}
function updateQty(k,v){getLine(k).qty=parseFloat(v)||null;save();renderConstructor()}
function updatePrice(k,v){getLine(k).price=parseFloat(v)||null;save();renderConstructor()}
function acceptImproved(rid,k){var im=improved[rid];if(!im)return;getLine(k).myName=im.new;improved[rid]=Object.assign({},im,{accepted:true});save();renderConstructor()}
function discardImproved(rid){delete improved[rid];save();renderConstructor()}

// Manual lines
function addManualLine(){
  manualLines.push({id:uid(),name:'',description:'',ud:'ud',qty:1,price:0,pct:DEFAULT_PCT,included:true});
  save();renderConstructor();
}
function upManual(id,f,v){var l=manualLines.find(function(x){return x.id===id});if(!l)return;l[f]=(f==='qty'||f==='price'||f==='pct')?(parseFloat(v)||0):v;save();renderConstructor()}
function toggleManual(id){var l=manualLines.find(function(x){return x.id===id});if(l){l.included=!l.included;save();renderConstructor()}}
function removeManual(id){manualLines=manualLines.filter(function(x){return x.id!==id});save();renderConstructor()}

function renderConstructor(){
  var el=document.getElementById('con-content');
  var hasProj=projects.some(function(p){return(p.pros||[]).some(function(pr){return(pr.chapters||[]).some(function(ch){return ch.partidas.length})})});
  var hasMn=manualLines.length>0;
  if(!hasProj&&!hasMn){
    el.innerHTML='<div class="empty"><span class="empty-icon">&#128203;</span>Importa PDFs en el paso 1, a\u00f1ade partidas desde la base de datos, o pulsa &quot;+ A\u00f1adir l\u00ednea&quot;.</div>';
    document.getElementById('totals-bar').innerHTML='';
    document.getElementById('comment-box').style.display='none';
    return;
  }
  var html='';
  // From projects
  projects.forEach(function(proj){
    (proj.pros||[]).forEach(function(pro){
      if(!(pro.chapters||[]).some(function(ch){return ch.partidas.length}))return;
      var proTot=pro.chapters.reduce(function(s,ch){return s+ch.partidas.reduce(function(ss,r){var l=getLine(lineKey(proj.id,pro.id,ch.id,r.id));if(!l.included)return ss;var q=l.qty!==null?l.qty:r.qty;var p2=l.price!==null?l.price:r.price;return ss+q*p2*(1+l.pct/100)},0)},0);
      html+='<div class="card" style="margin-bottom:12px;overflow:hidden">';
      html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surface);border-bottom:0.5px solid var(--border)">';
      html+='<div><span style="font-family:\'Fraunces\',serif;font-size:14px">'+esc(pro.name||'Profesional')+'</span><span style="font-size:11px;color:var(--text-3);margin-left:8px">'+esc(proj.name)+'</span></div>';
      html+='<span style="font-weight:500;color:var(--accent)">'+fmt(proTot)+'</span></div>';
      pro.chapters.forEach(function(ch){
        if(!ch.partidas.length)return;
        var chTot=ch.partidas.reduce(function(s,r){var l=getLine(lineKey(proj.id,pro.id,ch.id,r.id));if(!l.included)return s;var q=l.qty!==null?l.qty:r.qty;var p2=l.price!==null?l.price:r.price;return s+q*p2*(1+l.pct/100)},0);
        html+='<div class="ch-bar"><span>'+esc(ch.name)+'</span><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text-2)">'+fmt(chTot)+'</span></div>';
        html+=renderConRows(proj.id,pro.id,ch);
      });
      html+='</div>';
    });
  });
  // Manual lines
  if(manualLines.length){
    html+='<div class="card" style="margin-bottom:12px;overflow:hidden">';
    html+='<div style="padding:9px 14px;background:var(--surface);border-bottom:0.5px solid var(--border);font-family:\'Fraunces\',serif;font-size:14px;color:var(--text-2)">L\u00edneas manuales</div>';
    html+='<table class="contable"><thead><tr><th>Descripci\u00f3n</th><th>Ud.</th><th class="r">Cant.</th><th class="r">Precio</th><th class="r">%</th><th class="r">Mi precio</th><th style="width:28px;text-align:center">Inc.</th><th style="width:24px"></th></tr></thead><tbody>';
    manualLines.forEach(function(l){
      var base=l.qty*l.price;var final=base*(1+l.pct/100);
      html+='<tr>';
      html+='<td><textarea class="ne" rows="1" onchange="upManual(\''+l.id+'\',\'name\',this.value)">'+esc(l.name)+'</textarea>'
        +'<textarea class="de" rows="1" placeholder="Descripci\u00f3n..." onchange="upManual(\''+l.id+'\',\'description\',this.value)">'+esc(l.description||'')+'</textarea></td>';
      html+='<td><input class="ie sm" style="width:40px" value="'+esc(l.ud)+'" onchange="upManual(\''+l.id+'\',\'ud\',this.value)"></td>';
      html+='<td class="r"><input class="ie r" type="number" style="width:54px" value="'+l.qty+'" onchange="upManual(\''+l.id+'\',\'qty\',this.value)"></td>';
      html+='<td class="r"><input class="ie r" type="number" style="width:66px" value="'+l.price+'" onchange="upManual(\''+l.id+'\',\'price\',this.value)"></td>';
      html+='<td class="r"><div style="display:flex;align-items:center;gap:2px;justify-content:flex-end"><input type="number" class="pctinp" value="'+l.pct+'" '+(l.included?'':'disabled')+' onchange="upManual(\''+l.id+'\',\'pct\',this.value)"><span style="font-size:10px;color:var(--text-3)">%</span></div></td>';
      html+='<td class="r" style="font-weight:500;'+(l.included?'':'color:var(--text-3)')+'">'+(l.included?fmt(final):'&mdash;')+'</td>';

  var btn=document.querySelector('#db-pdf-inp+button');
  var prompt2='Analiza este cat\u00e1logo o presupuesto y extrae todas las partidas organizadas por categor\u00eda.\nDevuelve SOLO JSON:\n{"cats":[{"name":"Categor\u00eda","partidas":[{"name":"Nombre","description":"desc breve","ud":"ud","price":0}]}]}\nExtrae TODAS las partidas. Sin precio usa 0.';
  try{

function importDbCSV(inp){
  var f=inp.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var ls=e.target.result.split('\n').filter(function(l){return l.trim()});
    if(!ls.length)return;
    if(!db.cats)db.cats=[];if(!db.partidas)db.partidas=[];
    var catId=dbActiveCat||db.cats[0]&&db.cats[0].id;
    if(!catId){db.cats.push({id:uid(),name:'Importado CSV'});catId=db.cats[db.cats.length-1].id;}
    var sep=ls[0].includes(';')?';':',';
    var hdr=ls[0].split(sep).map(function(h){return h.trim().toLowerCase().replace(/"/g,'')});
    var iN=hdr.indexOf('nombre');if(iN<0)iN=hdr.indexOf('name');if(iN<0)iN=0;
    var iD=hdr.indexOf('descripcion');if(iD<0)iD=hdr.indexOf('description');
    var iU=hdr.indexOf('ud');if(iU<0)iU=hdr.indexOf('unidad');
    var iP=hdr.indexOf('precio');if(iP<0)iP=hdr.indexOf('price');
    var count=0;
    for(var i=1;i<ls.length;i++){
      var cols=ls[i].split(sep).map(function(c){return c.trim().replace(/^"|"$/g,'')});
      if(!cols[iN])continue;
      db.partidas.push({id:uid(),catId:catId,name:cols[iN],description:(iD>=0?cols[iD]:'')||'',ud:(iU>=0?cols[iU]:'')||'ud',price:(iP>=0?parseFloat(cols[iP]):0)||0});
      count++;
    }
    save();renderDb();alert(count+' partidas importadas desde CSV.');
  };
  reader.readAsText(f,'UTF-8');inp.value='';
}

        html+='<td style="padding:6px 7px;font-size:11px;color:#1C1917;line-height:1.4">'+esc(r.name||'Partida')+(r.description?'<div style="font-size:10px;color:#6B6560;margin-top:2px;line-height:1.4">'+esc(r.description).replace(/\n/g,'<br>')+'</div>':'')+'</td>';
        html+='<td style="padding:6px 7px;font-size:11px;color:#6B6560;text-align:right;vertical-align:top">'+esc(r.ud||'')+'</td>';
        html+='<td style="padding:6px 7px;font-size:11px;color:#6B6560;text-align:right;vertical-align:top">'+r.effQty+'</td>';
        html+='<td style="padding:6px 7px;font-size:11px;color:#6B6560;text-align:right;vertical-align:top">'+fmtP(r.unitPrice)+'</td>';
        html+='<td style="padding:6px 7px;font-size:11px;color:#1C1917;text-align:right;font-weight:500;vertical-align:top">'+fmtP(r.myPrice)+'</td></tr>';
      });
      html+='</table><div style="margin-bottom:10px"></div>';
    });
  });
  if(comentario)html+='<div style="margin-top:14px;padding:11px 13px;background:#FEF0EB;border-radius:5px;border-left:3px solid '+OG+';font-size:11px;color:#1C1917;line-height:1.6">'+esc(comentario).replace(/\n/g,'<br>')+'</div>';
  html+='<div style="border-top:2px solid '+OG+';margin-top:14px;padding-top:12px"><table style="width:100%;border-collapse:collapse"><tr>';
  html+='<td style="font-size:11px;color:#6B6560;vertical-align:top">IVA no incluido en precios unitarios.</td>';
  html+='<td style="text-align:right"><table style="border-collapse:collapse">';
  html+='<tr><td style="padding:3px 0;font-size:12px;color:#6B6560;padding-right:22px">Base imponible</td><td style="font-size:12px;color:#1C1917;text-align:right;min-width:88px">'+fmtP(base)+'</td></tr>';
  html+='<tr><td style="padding:3px 0;font-size:12px;color:#6B6560;padding-right:22px">IVA 21%</td><td style="font-size:12px;color:#1C1917;text-align:right">'+fmtP(iva)+'</td></tr>';
  html+='<tr style="border-top:0.5px solid #D4CEC6"><td style="padding:5px 0 0;font-size:14px;font-weight:700;color:'+OG+';padding-right:22px">TOTAL</td><td style="font-size:14px;font-weight:700;color:'+OG+';text-align:right;padding-top:5px">'+fmtP(base+iva)+'</td></tr>';
  html+='</table></td></tr></table></div>';
  if(cfg.cuenta)html+='<div style="margin-top:16px;padding:9px 12px;background:#F7F5F2;border-radius:5px;font-size:11px;color:#6B6560"><strong style="color:#1C1917">Transferencia: </strong>'+esc(cfg.cuenta)+'</div>';
  if(cfg.condiciones)html+='<div style="margin-top:11px;font-size:10px;color:#A8A29E;line-height:1.6;border-top:0.5px solid #E8E4DE;padding-top:11px">'+esc(cfg.condiciones).replace(/\n/g,'<br>')+'</div>';
  el.innerHTML=html;
}

function saveToProject(){
  var proj=getActiveProject();
  if(!proj&&projects.length)proj=projects[0];
  if(!proj){alert('No hay ning\u00fan proyecto activo. Crea uno primero.');return;}
  var num=document.getElementById('f-num')&&document.getElementById('f-num').value||'Sin n\u00famero';
  var fecha=new Date().toISOString().split('T')[0];
  if(!proj.savedPDFs)proj.savedPDFs=[];
  proj.savedPDFs.push({id:uid(),num:num,fecha:fecha,html:document.getElementById('pdf-doc').innerHTML});
  save();
  alert('Presupuesto "'+num+'" guardado en el proyecto "'+proj.name+'".');
}

function printPDF(){
  var content=document.getElementById('pdf-doc').innerHTML;
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Presupuesto</title><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}body{font-family:Arial,sans-serif;font-size:12px;color:#1C1917;padding:28px;max-width:820px;margin:0 auto}table{border-collapse:collapse}@media print{body{padding:14px}}</style></head><body>'+content+'</body></html>');
  w.document.close();setTimeout(function(){w.print()},400);
}

function toB64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(',')[1])};r.onerror=rej;r.readAsDataURL(file)})}

async function apiCall(messages,maxTokens){
  var key=cfg.key||'';if(!key)throw new Error('API key no configurada');
  var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens||4000,messages:messages})});
  var data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content[0].text;
}

function safeParseJSON(raw){
  var c=raw.replace(/```json|```/g,'').trim();
  try{return JSON.parse(c)}catch(e){
    var r=c,opens=0,inStr=false,esc2=false;
    for(var i=0;i<r.length;i++){var ch=r[i];if(esc2){esc2=false;continue}if(ch==='\\'){esc2=true;continue}if(ch==='"')inStr=!inStr;if(!inStr){if(ch==='{')opens++;else if(ch==='}')opens--;}}
    if(inStr)r+='"';r+=']}';while(opens>1){r+='}';opens--;}
    try{return JSON.parse(r)}catch(e2){throw new Error('JSON inv\u00e1lido. El archivo puede ser demasiado extenso.')}
  }
}

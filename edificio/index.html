<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edificio PSJ 97 · Fem Homes Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Barlow+Condensed:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1a18;--paper:#f5f2ec;--paper2:#ede9e0;
  --terra:#8b5e3c;--terra-l:#c49a6c;--terra-p:#f0e6d8;
  --green:#3a6b3a;--green-l:#e8f2e8;
  --amber:#b8860b;--amber-l:#fef9e7;
  --gray:#888;--gray-l:#f0ede8;
  --border:rgba(26,26,24,0.12);--border-s:rgba(26,26,24,0.25);
  --r:8px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
html,body{min-height:100%;font-family:'Archivo',sans-serif;background:var(--paper);color:var(--ink);}
.bg-overlay{position:fixed;inset:0;background-image:url('https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1600&q=60');background-size:cover;background-position:center top;opacity:0.07;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}

/* HEADER */
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border-s);flex-wrap:wrap;gap:1rem;}
.header-left h1{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:600;letter-spacing:0.04em;}
.header-left p{font-size:12px;color:var(--gray);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--gray);text-decoration:none;letter-spacing:0.05em;padding:5px 0;margin-bottom:1rem;transition:color 0.15s;}
.back-btn:hover{color:var(--terra);}
.header-right{display:flex;align-items:flex-end;gap:1.5rem;flex-wrap:wrap;}
.header-stats{display:flex;gap:1.5rem;flex-wrap:wrap;}
.stat{text-align:right;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:600;line-height:1;}
.stat-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
.admin-card{border:1px solid var(--border-s);border-radius:var(--r);background:white;padding:10px 14px;display:flex;flex-direction:column;gap:6px;min-width:220px;}
.admin-card-label{font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.07em;}
.admin-card-row{display:flex;gap:6px;align-items:center;}
.admin-card-row input{flex:1;font-family:'Archivo',sans-serif;font-size:12px;color:var(--ink);background:var(--paper);border:1px solid var(--border-s);border-radius:6px;padding:5px 8px;min-width:0;}
.admin-card-row input:focus{outline:none;border-color:var(--terra);}
.admin-open-btn{font-family:'Archivo',sans-serif;font-size:11px;font-weight:500;padding:5px 10px;border-radius:6px;border:1px solid var(--border-s);background:var(--ink);color:white;cursor:pointer;white-space:nowrap;transition:background 0.15s;flex-shrink:0;}
.admin-open-btn:hover{background:#333;}

/* LEGEND */
.legend{display:flex;gap:1.25rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:0.05em;}
.legend-dot{width:10px;height:10px;border-radius:50%;border:1px solid;}

/* BUILDING */
.building{margin-bottom:2.5rem;}
.floor{display:flex;align-items:stretch;gap:8px;margin-bottom:5px;}
.floor-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gray);width:58px;text-align:right;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;letter-spacing:0.03em;}
.units{display:flex;gap:5px;flex:1;}
.unit{flex:1;min-height:56px;border:1px solid var(--border);border-radius:var(--r);background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;padding:6px 4px;}
.unit:hover{border-color:var(--terra-l);transform:translateY(-1px);box-shadow:var(--shadow);}
.unit.selected{border:1.5px solid var(--terra);background:var(--terra-p);}
.unit.occupied{background:var(--green-l);border-color:rgba(58,107,58,0.3);}
.unit.occupied:hover{border-color:var(--green);}
.unit.vacant{background:repeating-linear-gradient(45deg,#f8f8f8,#f8f8f8 4px,#efefef 4px,#efefef 8px);}
.unit.familiar{background:var(--amber-l);border-color:rgba(184,134,11,0.3);}
.unit.familiar:hover{border-color:var(--amber);}
.unit.unassigned{background:var(--gray-l);border-style:dashed;}
.unit-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--ink);text-align:center;line-height:1.2;letter-spacing:0.02em;}
.unit-tenant{font-size:8.5px;color:var(--gray);margin-top:2px;text-align:center;line-height:1.2;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.unit-dot{width:5px;height:5px;border-radius:50%;margin-top:4px;}
.dot-occupied{background:var(--green);}
.dot-vacant{background:#bbb;}
.dot-familiar{background:var(--amber);}
.dot-unassigned{background:#ddd;}
.unit-link{font-size:8px;color:var(--terra);letter-spacing:0.04em;margin-top:2px;text-align:center;}

/* PANEL */
.panel{background:white;border:1px solid var(--border-s);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:2.5rem;}
.panel-header{background:var(--ink);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:600;color:white;letter-spacing:0.04em;}
.panel-nombre{font-size:13px;color:rgba(255,255,255,0.7);}
.panel-badge{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.07em;flex-shrink:0;}
.badge-occupied{background:var(--green-l);color:var(--green);}
.badge-vacant{background:#f0ede8;color:#888;}
.badge-familiar{background:var(--amber-l);color:var(--amber);}
.badge-unassigned{background:#f0ede8;color:#888;}
.panel-body{padding:20px;}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab-btn{font-family:'Archivo',sans-serif;font-size:12px;font-weight:500;color:var(--gray);background:none;border:none;border-bottom:2px solid transparent;padding:8px 16px;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;transition:all 0.15s;margin-bottom:-1px;}
.tab-btn:hover{color:var(--ink);}
.tab-btn.active{color:var(--terra);border-bottom-color:var(--terra);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fields-grid.three{grid-template-columns:1fr 1fr 1fr;}
.fields-grid.full{grid-template-columns:1fr;}
.field label{display:block;font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;font-family:'Archivo',sans-serif;font-size:13px;color:var(--ink);background:var(--paper);border:1px solid var(--border-s);border-radius:6px;padding:7px 10px;transition:border-color 0.15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--terra);}
.field textarea{height:70px;resize:vertical;}
.icloud-row{display:flex;gap:8px;align-items:center;}
.icloud-row input{flex:1;}
.icloud-btn{font-family:'Archivo',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;border-radius:6px;border:1px solid var(--border-s);background:var(--paper);color:var(--ink);cursor:pointer;white-space:nowrap;transition:all 0.15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.icloud-btn:hover{background:var(--terra-p);border-color:var(--terra);}
.icloud-btn.primary{background:var(--ink);color:white;border-color:var(--ink);}
.icloud-btn.primary:hover{background:#333;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.section-label{font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.alert-box{background:#fff8e6;border:1px solid #f0c040;border-radius:6px;padding:10px 14px;font-size:12px;color:#7a5a00;margin-bottom:12px;line-height:1.5;}
.panel-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
.saved-msg{font-size:12px;color:var(--green);font-weight:500;display:none;align-items:center;gap:4px;margin-top:8px;}
.unified-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--terra);background:var(--terra-p);border:1px solid var(--terra-l);border-radius:20px;padding:3px 10px;margin-bottom:12px;cursor:pointer;}
.unified-badge:hover{background:#e8d5c0;}

/* CALENDARIO */
.cal-section{border-top:1px solid var(--border-s);padding-top:2rem;margin-left:66px;}
.cal-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:600;}
.cal-sub{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.cal-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cal-view-btn{font-family:'Archivo',sans-serif;font-size:12px;font-weight:500;padding:5px 14px;border-radius:6px;border:1px solid var(--border-s);background:white;color:var(--gray);cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.05em;}
.cal-view-btn.active{background:var(--ink);color:white;border-color:var(--ink);}
.cal-nav{display:flex;align-items:center;gap:6px;margin:0 4px;}
.cal-nav-btn{font-size:16px;background:none;border:1px solid var(--border-s);border-radius:6px;width:30px;height:30px;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.cal-nav-btn:hover{background:var(--paper2);}
.cal-period{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:600;min-width:160px;text-align:center;letter-spacing:0.03em;}
.cal-export-btn{font-family:'Archivo',sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--terra-l);background:var(--terra-p);color:var(--terra);cursor:pointer;transition:all 0.15s;}
.cal-export-btn:hover{background:var(--terra);color:white;}

/* Month grid */
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.cal-dow{font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.07em;text-align:center;padding:4px 0;}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{height:80px;border:1px solid var(--border);border-radius:6px;background:white;padding:5px 6px;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;overflow:hidden;}
.cal-day:hover{border-color:var(--terra-l);background:var(--terra-p);}
.cal-day.other-month{background:var(--gray-l);opacity:0.45;pointer-events:none;}
.cal-day.today{border-color:var(--terra);border-width:1.5px;}
.cal-day-num{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;line-height:1;margin-bottom:4px;}
.cal-day.today .cal-day-num{color:var(--terra);}
.cal-event{font-size:9px;font-weight:500;padding:2px 5px;border-radius:3px;margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-ipc{background:#e8f4fd;color:#1a5276;}
.ev-fin{background:#fdecea;color:#922b21;}
.ev-task-verde{background:#e8f8e8;color:#1e6b1e;}
.ev-task-azul{background:#e8f0fd;color:#1a3a7a;}
.ev-task-rojo{background:#fdecea;color:#922b21;}
.ev-task-naranja{background:#fdf0e0;color:#8b4513;}
.ev-task-gris{background:#f0ede8;color:#555;}

/* Year grid */
.cal-year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;}
.cal-mini-month{}
.cal-mini-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.03em;margin-bottom:6px;text-align:center;}
.cal-mini-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px;}
.cal-mini-dow span{font-size:8px;color:var(--gray);text-align:center;}
.cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.cal-mini-day{font-size:9px;text-align:center;padding:2px 1px;border-radius:3px;cursor:pointer;transition:background 0.1s;line-height:1.4;}
.cal-mini-day:hover{background:var(--terra-p);}
.cal-mini-day.other{color:#ccc;pointer-events:none;}
.cal-mini-day.today-mini{color:var(--terra);font-weight:600;}
.cal-mini-day.has-ev{background:var(--green-l);border-radius:3px;}
.cal-mini-day.has-task{background:var(--amber-l);}

/* MODAL */
.task-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;}
.task-modal-overlay.open{display:flex;}
.task-modal-box{background:white;border-radius:12px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.15);max-height:90vh;display:flex;flex-direction:column;}
.task-modal-header{background:var(--ink);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.task-modal-date{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:600;color:white;letter-spacing:0.03em;}
.task-modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:rgba(255,255,255,0.6);line-height:1;}
.task-modal-close:hover{color:white;}
.task-modal-body{padding:16px;overflow-y:auto;}
.task-auto-section{margin-bottom:12px;}
.task-auto-label{font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
.task-auto-item{font-size:12px;padding:6px 10px;border-radius:5px;margin-bottom:4px;line-height:1.4;}
.task-manual-section{border-top:1px solid var(--border);padding-top:12px;margin-top:4px;}
.task-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-item-text{flex:1;font-size:13px;}
.task-item-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;line-height:1;padding:0 4px;}
.task-item-del:hover{color:#c0392b;}
.task-add-row{display:flex;gap:8px;margin-top:12px;align-items:center;}
.task-add-row input{flex:1;font-family:'Archivo',sans-serif;font-size:13px;color:var(--ink);background:var(--paper);border:1px solid var(--border-s);border-radius:6px;padding:7px 10px;}
.task-add-row input:focus{outline:none;border-color:var(--terra);}
.color-picker{display:flex;gap:5px;margin-bottom:10px;}
.color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s;}
.color-dot.selected{border-color:var(--ink);}

@media(max-width:700px){
  .fields-grid{grid-template-columns:1fr;}
  .fields-grid.three{grid-template-columns:1fr 1fr;}
  .floor-label{width:42px;font-size:10px;}
  .unit{min-height:46px;}
  .unit-name{font-size:9px;}
  .cal-year-grid{grid-template-columns:repeat(2,1fr);}
  .cal-day{height:60px;}
  .cal-section{margin-left:50px;}
}
</style>
</head>
<body>
<div class="bg-overlay"></div>
<div class="app">

<div class="header">
  <div class="header-left">
    <a href="../" class="back-btn">← Lab</a>
    <h1>Paseo Sant Joan 97</h1>
    <p>Barcelona · Panel de gestión</p>
  </div>
  <div class="header-right">
    <div class="header-stats" id="header-stats"></div>
    <div class="admin-card">
      <div class="admin-card-label">Administración general</div>
      <div class="admin-card-row">
        <input type="url" id="admin-icloud" placeholder="Enlace carpeta iCloud…" />
        <button class="admin-open-btn" onclick="openAdmin()">Abrir</button>
      </div>
    </div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--green-l);border-color:var(--green);"></div>Alquilado</div>
  <div class="legend-item"><div class="legend-dot" style="background:#efefef;border-color:#ccc;"></div>Vacío</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--amber-l);border-color:var(--amber);"></div>Familiar</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--gray-l);border-color:#ccc;border-style:dashed;"></div>Sin datos</div>
</div>

<div class="building" id="building"></div>

<div class="panel" id="panel" style="display:none;">
  <div class="panel-header">
    <div>
      <div class="panel-title" id="p-title">—</div>
      <div class="panel-nombre" id="p-nombre"></div>
    </div>
    <span class="panel-badge" id="p-badge">—</span>
  </div>
  <div class="panel-body">
    <div class="panel-tabs">
      <button class="tab-btn active" onclick="showTab('ficha')">Ficha</button>
      <button class="tab-btn" onclick="showTab('contrato')">Contrato</button>
      <button class="tab-btn" onclick="showTab('contacto')">Contacto</button>
      <button class="tab-btn" onclick="showTab('notas')">Notas</button>
      <button class="tab-btn" onclick="showTab('docs')">Documentos</button>
    </div>

    <div class="tab-content active" id="tab-ficha">
      <div class="fields-grid three">
        <div class="field"><label>Tipo</label><input type="text" id="f-tipo"/></div>
        <div class="field"><label>Metros</label><input type="number" id="f-metros"/></div>
        <div class="field"><label>Estado</label>
          <select id="f-status">
            <option value="occupied">Alquilado</option>
            <option value="vacant">Vacío</option>
            <option value="familiar">Familiar</option>
            <option value="unassigned">Sin datos</option>
          </select>
        </div>
      </div>
      <div class="fields-grid">
        <div class="field"><label>Inquilino / empresa</label><input type="text" id="f-nombre"/></div>
        <div class="field"><label>Revisión IPC</label><input type="text" id="f-ipc"/></div>
      </div>
      <div class="fields-grid">
        <div class="field"><label>Unificada con (ID)</label><input type="text" id="f-unified" placeholder="ej. 2º2ª"/></div>
        <div class="field" id="unified-link-field" style="display:none;"></div>
      </div>
      <hr class="divider">
      <div class="fields-grid three">
        <div class="field"><label>Alquiler sin IVA (€)</label><input type="number" id="f-alq-sin-iva" step="0.01" placeholder="0.00"/></div>
        <div class="field"><label>IVA (€)</label><input type="number" id="f-iva" step="0.01" placeholder="0.00"/></div>
        <div class="field"><label>Total recibo (€)</label><input type="number" id="f-total" step="0.01" placeholder="0.00"/></div>
      </div>
    </div>

    <div class="tab-content" id="tab-contrato">
      <div id="contrato-alert"></div>
      <div class="fields-grid">
        <div class="field"><label>Inicio de contrato</label><input type="date" id="f-inicio"/></div>
        <div class="field"><label>Fin de contrato</label><input type="text" id="f-fin" placeholder="aaaa-mm-dd o INDEFINIDO"/></div>
      </div>
      <div class="fields-grid full">
        <div class="field"><label>Observaciones</label><textarea id="f-obs"></textarea></div>
      </div>
    </div>

    <div class="tab-content" id="tab-contacto">
      <div class="fields-grid full"><div class="field"><label>Teléfonos</label><input type="text" id="f-tel"/></div></div>
      <div class="fields-grid full"><div class="field"><label>Email</label><input type="text" id="f-mail"/></div></div>
    </div>

    <div class="tab-content" id="tab-notas">
      <div class="fields-grid full"><div class="field"><label>Notas internas</label><textarea id="f-notas" style="height:120px;" placeholder="Anotaciones, incidencias, recordatorios..."></textarea></div></div>
    </div>

    <div class="tab-content" id="tab-docs">
      <p class="section-label">Carpeta iCloud</p>
      <p style="font-size:12px;color:var(--gray);margin-bottom:12px;line-height:1.6;">Pega el enlace compartido de la carpeta iCloud de esta unidad.</p>
      <div class="icloud-row">
        <div class="field" style="flex:1;margin:0;"><input type="url" id="f-icloud" placeholder="https://www.icloud.com/iclouddrive/..."/></div>
        <a href="#" class="icloud-btn" onclick="return openIcloud()">&#9656; Abrir carpeta</a>
      </div>
    </div>

    <div class="panel-actions">
      <button class="icloud-btn" onclick="closePanel()">Cerrar</button>
      <button class="icloud-btn primary" onclick="saveUnit()">Guardar cambios</button>
    </div>
    <div class="saved-msg" id="saved-msg">✓ Guardado correctamente</div>
  </div>
</div>

<!-- CALENDARIO -->
<div class="cal-section">
  <div class="cal-header">
    <div>
      <h2 class="cal-title">Calendario</h2>

function fmtEur(v){const n=parseFloat(v);if(!v||isNaN(n))return'—';return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function dateKey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function getAutoEvents(){
  const evs={};
  Object.entries(data).forEach(([id,u])=>{
    if(u.fin&&u.fin!=='INDEFINIDO'&&u.fin.match(/^\d{4}-\d{2}-\d{2}$/)){
      if(!evs[u.fin])evs[u.fin]=[];
      evs[u.fin].push({type:'fin',label:`Fin contrato ${id}`,cls:'ev-fin'});
    }
    if(u.revision_ipc&&u.inicio){
      const months_map={enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
      const rip=u.revision_ipc.toLowerCase();
      let revMonth=null;
      Object.entries(months_map).forEach(([name,num])=>{if(rip.includes(name))revMonth=num;});
      if(revMonth){
        for(let yr=2025;yr<=2032;yr++){
          const k=`${yr}-${String(revMonth).padStart(2,'0')}-01`;
          if(!evs[k])evs[k]=[];
          evs[k].push({type:'ipc',label:`IPC ${id}`,cls:'ev-ipc'});
        }
      }
    }
  });
  return evs;
}

function updateStats(){
  const all=Object.values(data);
  const occ=all.filter(u=>u.status==='occupied').length;
  const vac=all.filter(u=>u.status==='vacant').length;
  const total=all.reduce((s,u)=>s+(parseFloat(u.total_recibo)||0),0);
  document.getElementById('header-stats').innerHTML=`
    <div class="stat"><div class="stat-num">${occ}</div><div class="stat-label">Alquiladas</div></div>
    <div class="stat"><div class="stat-num">${vac}</div><div class="stat-label">Vacías</div></div>
    <div class="stat"><div class="stat-num">${total.toLocaleString('es-ES',{maximumFractionDigits:0})} €</div><div class="stat-label">Ingresos / mes</div></div>`;
}

function renderBuilding(){
  const c=document.getElementById('building');c.innerHTML='';
  FLOORS.forEach(floor=>{
    const row=document.createElement('div');row.className='floor';
    const lbl=document.createElement('div');lbl.className='floor-label';lbl.textContent=floor.label;row.appendChild(lbl);
    const ud=document.createElement('div');ud.className='units';
    floor.units.forEach(uid=>{
      const u=getUnit(uid);
      const el=document.createElement('div');
      el.className='unit '+u.status+(selected===uid?' selected':'');
      const nm=document.createElement('div');nm.className='unit-name';nm.textContent=uid==='ATICO'?'Ático':uid;el.appendChild(nm);
      if(u.nombre&&u.nombre!=='VACIO'){const s=document.createElement('div');s.className='unit-tenant';s.textContent=u.nombre.length>14?u.nombre.slice(0,14)+'…':u.nombre;el.appendChild(s);}
      const dot=document.createElement('div');dot.className='unit-dot dot-'+u.status;el.appendChild(dot);
      if(u.unified){const lk=document.createElement('div');lk.className='unit-link';lk.textContent='⬡ '+u.unified;el.appendChild(lk);}
      el.onclick=()=>selectUnit(uid);ud.appendChild(el);
    });
    row.appendChild(ud);c.appendChild(row);
  });
}

function selectUnit(id){

  const lf=document.getElementById('unified-link-field');
  if(u.unified&&data[u.unified]){lf.style.display='block';lf.innerHTML=`<label>Ir a vinculada</label><div class="unified-badge" onclick="selectUnit('${u.unified}')">⬡ ${u.unified} — ${data[u.unified].nombre||'—'}</div>`;}
  else{lf.style.display='none';lf.innerHTML='';}
  const ab=document.getElementById('contrato-alert');
  if(u.fin&&u.fin!=='INDEFINIDO'&&u.fin!==''){
    const fd=new Date(u.fin),today=new Date(),diff=Math.ceil((fd-today)/(1000*60*60*24));
    ab.innerHTML=diff<180?`<div class="alert-box">⚠ Contrato vence ${diff<0?'hace '+Math.abs(diff)+' días':'en '+diff+' días'} — ${u.fin}</div>`:'';
  }else{ab.innerHTML='';}
  showTab('ficha');
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('saved-msg').style.display='none';
}

function showTab(name){
  const tabs=['ficha','contrato','contacto','notas','docs'];

  document.querySelectorAll('.tab-content').forEach(t=>t.classList.toggle('active',t.id==='tab-'+name));
}

  if(unified&&unified!==selected){
    const tgt=getUnit(unified);
    data[unified]=Object.assign({},tgt,{status:updated.status,nombre:updated.nombre,tipo:updated.tipo,revision_ipc:updated.revision_ipc,inicio:updated.inicio,fin:updated.fin,observaciones:updated.observaciones,telefonos:updated.telefonos,mail:updated.mail,icloud:updated.icloud,alq_sin_iva:updated.alq_sin_iva,iva:updated.iva,total_recibo:updated.total_recibo,unified:selected});
  }
  saveData();renderBuilding();updateStats();selectUnit(selected);
  const msg=document.getElementById('saved-msg');msg.style.display='flex';
  setTimeout(()=>msg.style.display='none',2500);
}

function closePanel(){selected=null;document.getElementById('panel').style.display='none';renderBuilding();}
function openIcloud(){const url=document.getElementById('f-icloud').value.trim();if(!url){alert('Añade el enlace de iCloud.');return false;}window.open(url,'_blank');return false;}
function openAdmin(){const url=document.getElementById('admin-icloud').value.trim();if(!url){alert('Añade el enlace de la carpeta iCloud de administración.');return;}try{localStorage.setItem('psj97_admin_icloud',url);}catch(e){}window.open(url,'_blank');}

/* CALENDARIO */
function setView(v){
  calView=v;
  document.getElementById('btn-mes').classList.toggle('active',v==='mes');
  document.getElementById('btn-year').classList.toggle('active',v==='year');
  renderCal();
}

function navCal(dir){
  if(calView==='mes'){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);}
  else{calDate=new Date(calDate.getFullYear()+dir,0,1);}
  renderCal();
}

function renderCal(){
  if(calView==='mes')renderMonth(calDate.getFullYear(),calDate.getMonth());
  else renderYear(calDate.getFullYear());
}

function renderMonth(yr,mo){
  const evs=getAutoEvents();
  const today=new Date();
  document.getElementById('cal-period').textContent=MONTHS[mo]+' '+yr;
  const first=new Date(yr,mo,1);
  let startDow=first.getDay();if(startDow===0)startDow=7;
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const daysInPrev=new Date(yr,mo,0).getDate();
  let html=`<div class="cal-dow-row">${DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div><div class="cal-month-grid">`;
  for(let i=startDow-1;i>0;i--){
    const d=daysInPrev-i+1;
    html+=`<div class="cal-day other-month"><div class="cal-day-num" style="color:#ccc">${d}</div></div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const k=dateKey(yr,mo,d);
    const isToday=today.getFullYear()===yr&&today.getMonth()===mo&&today.getDate()===d;
    const dayEvs=evs[k]||[];
    const dayTasks=tasks[k]||[];
    let cls='cal-day'+(isToday?' today':'')+(dayEvs.length||dayTasks.length?' has-events':'');
    let evHtml=dayEvs.slice(0,2).map(e=>`<div class="cal-event ${e.cls}">${e.label}</div>`).join('');
    evHtml+=dayTasks.slice(0,2).map(t=>`<div class="cal-event ${COLORS[t.color]||'ev-task-gris'}">${t.text}</div>`).join('');
    if(dayEvs.length+dayTasks.length>2)evHtml+=`<div style="font-size:9px;color:var(--gray);">+${dayEvs.length+dayTasks.length-2} más</div>`;
    html+=`<div class="${cls}" onclick="openDay('${k}','${d} ${MONTHS[mo]} ${yr}')"><div class="cal-day-num">${d}</div>${evHtml}</div>`;
  }
  const total=startDow-1+daysInMonth;
  const remaining=(7-total%7)%7;
  for(let d=1;d<=remaining;d++){html+=`<div class="cal-day other-month"><div class="cal-day-num" style="color:#ccc">${d}</div></div>`;}
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function renderYear(yr){
  const evs=getAutoEvents();
  const today=new Date();
  document.getElementById('cal-period').textContent=String(yr);
  let html='<div class="cal-year-grid">';
  for(let mo=0;mo<12;mo++){
    const first=new Date(yr,mo,1);
    let startDow=first.getDay();if(startDow===0)startDow=7;
    const dim=new Date(yr,mo+1,0).getDate();
    const dip=new Date(yr,mo,0).getDate();
    html+=`<div class="cal-mini-month"><div class="cal-mini-title">${MONTHS[mo]}</div>`;
    html+=`<div class="cal-mini-dow">${DAYS.map(d=>`<span>${d[0]}</span>`).join('')}</div>`;
    html+='<div class="cal-mini-grid">';
    for(let i=startDow-1;i>0;i--){html+=`<div class="cal-mini-day other">${dip-i+1}</div>`;}
    for(let d=1;d<=dim;d++){
      const k=dateKey(yr,mo,d);
      const isToday=today.getFullYear()===yr&&today.getMonth()===mo&&today.getDate()===d;
      const hasEv=(evs[k]&&evs[k].length>0);
      const hasTask=(tasks[k]&&tasks[k].length>0);
      let cls='cal-mini-day'+(isToday?' today-mini':'')+(hasTask?' has-task':hasEv?' has-ev':'');
      html+=`<div class="${cls}" onclick="openDay('${k}','${d} ${MONTHS[mo]} ${yr}')" title="${k}">${d}</div>`;
    }
    const tot=startDow-1+dim;const rem=(7-tot%7)%7;
    for(let d=1;d<=rem;d++){html+=`<div class="cal-mini-day other">${d}</div>`;}
    html+='</div></div>';
  }
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function openDay(k,label){
  taskModalDate=k;
  document.getElementById('task-modal-date').textContent=label;
  const evs=getAutoEvents();
  const dayEvs=evs[k]||[];
  let autoHtml='';
  if(dayEvs.length){
    autoHtml=`<div class="task-auto-section"><div class="task-auto-label">Automático</div>`;
    dayEvs.forEach(e=>{autoHtml+=`<div class="task-auto-item ${e.cls}">${e.label}</div>`;});
    autoHtml+='</div>';
  }
  document.getElementById('task-auto-section').innerHTML=autoHtml;
  renderTaskList();
  renderColorPicker();
  document.getElementById('task-input').value='';
  document.getElementById('task-modal').classList.add('open');
}

function renderColorPicker(){
  const cp=document.getElementById('color-picker');
  cp.innerHTML=Object.entries(COLOR_BG).map(([name,bg])=>`<div class="color-dot${selectedColor===name?' selected':''}" style="background:${bg};" onclick="selectColor('${name}')" title="${name}"></div>`).join('');
}

function selectColor(c){selectedColor=c;renderColorPicker();}

function renderTaskList(){
  const k=taskModalDate;
  const list=tasks[k]||[];
  document.getElementById('task-list').innerHTML=list.length?list.map((t,i)=>`<div class="task-item"><div class="cal-event ${COLORS[t.color]||'ev-task-gris'}" style="flex:1;white-space:normal;">${t.text}</div><button class="task-item-del" onclick="deleteTask(${i})">×</button></div>`).join(''):'<p style="font-size:12px;color:var(--gray);padding:6px 0;">Sin tareas</p>';
}

function addTask(){
  const input=document.getElementById('task-input');
  const text=input.value.trim();if(!text)return;
  const k=taskModalDate;
  if(!tasks[k])tasks[k]=[];
  tasks[k].push({text,color:selectedColor});
  saveTasks();renderTaskList();renderCal();input.value='';
}

function deleteTask(i){
  const k=taskModalDate;
  if(tasks[k]){tasks[k].splice(i,1);if(!tasks[k].length)delete tasks[k];}
  saveTasks();renderTaskList();renderCal();
}

function closeTaskModal(){document.getElementById('task-modal').classList.remove('open');}

function exportICS(){
  const evs=getAutoEvents();
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//PSJ97//ES\r\n';
  const allDates=new Set([...Object.keys(evs),...Object.keys(tasks)]);
  allDates.forEach(k=>{
    const[yr,mo,dy]=k.split('-');
    const dt=yr+mo+dy;
    (evs[k]||[]).forEach(e=>{
      ics+=`BEGIN:VEVENT\r\nUID:${k}-${Math.random()}\r\nDTSTART;VALUE=DATE:${dt}\r\nDTEND;VALUE=DATE:${dt}\r\nSUMMARY:${e.label}\r\nEND:VEVENT\r\n`;
    });
    (tasks[k]||[]).forEach(t=>{
      ics+=`BEGIN:VEVENT\r\nUID:${k}-${Math.random()}\r\nDTSTART;VALUE=DATE:${dt}\r\nDTEND;VALUE=DATE:${dt}\r\nSUMMARY:${t.text}\r\nEND:VEVENT\r\n`;
    });
  });
  ics+='END:VCALENDAR';
  const blob=new Blob([ics],{type:'text/calendar'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='PSJ97-calendario.ics';a.click();
}

// Init
renderBuilding();
updateStats();
renderCal();
const adminUrl=localStorage.getItem('psj97_admin_icloud');
if(adminUrl)document.getElementById('admin-icloud').value=adminUrl;
document.getElementById('admin-icloud').addEventListener('change',function(){try{localStorage.setItem('psj97_admin_icloud',this.value.trim());}catch(e){}});
document.getElementById('task-modal').addEventListener('click',function(e){if(e.target===this)closeTaskModal();});
